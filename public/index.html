
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Escola Italiana Eugenio Montale</title>
<title>Dashboard IoT - Gestão do Ambiente</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
<h1>Dashboard IoT - Monitoramento Ambiental</h1>
</header>

<section class="cards">
<div class="card"><h2>Temperatura</h2><p id="temp">--</p></div>
<div class="card"><h2>Umidade</h2><p id="hum">--</p></div>
<div class="card"><h2>Qualidade do Ar</h2><p id="air">--</p></div>
<div class="card"><h2>Luminosidade</h2><p id="light">--</p></div>
</section>

<section class="alerta">
<h2>Status</h2>
<p id="alerta">Aguardando dados...</p>
</section>

<section class="grafico">
<canvas id="graficoTemp"></canvas>
</section>

<section>
<h2>Mapa da Escola</h2>
<embed src="assets/croqui_escola.pdf" width="800" height="500">
</section>

<section>
<h2>Histórico</h2>
<table>
<thead>
<tr>
<th>ID</th>
<th>Temp</th>
<th>Umidade</th>
<th>Ar</th>
<th>Luz</th>
<th>Data</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</section>

<script src="js/dashboard.js"></script>
</body>
</html>
