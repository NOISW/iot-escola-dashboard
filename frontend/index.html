
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard IoT Escola</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
<h1>Monitoramento Ambiental - Escola IoT</h1>
</header>

<section class="cards">

<div class="card">
<h2>Temperatura</h2>
<p id="temp">--</p>
</div>

<div class="card">
<h2>Umidade</h2>
<p id="hum">--</p>
</div>

<div class="card">
<h2>Qualidade do Ar</h2>
<p id="air">--</p>
</div>

<div class="card">
<h2>Luminosidade</h2>
<p id="light">--</p>
</div>

</section>

<section class="alerta">
<h2>Status Ambiental</h2>
<p id="alerta">Aguardando dados...</p>
</section>

<section class="charts">
<canvas id="graficoTemp"></canvas>
</section>

<section class="mapa">
<h2>Mapa da Escola e Sensores</h2>

<div class="mapa-container">

<img src="assets/croqui_escola.pdf" class="croqui">

<div class="sensor s1">Sala 1</div>
<div class="sensor s2">Sala 2</div>
<div class="sensor s3">Informática</div>
<div class="sensor s4">Biblioteca</div>

</div>

</section>

<section class="tabela">

<h2>Histórico de Leituras</h2>

<table>

<thead>
<tr>
<th>ID</th>
<th>Temp</th>
<th>Umidade</th>
<th>Ar</th>
<th>Luz</th>
<th>Data</th>
</tr>
</thead>

<tbody id="dadosTabela"></tbody>

</table>

</section>

<script src="js/dashboard.js"></script>

</body>
</html>
